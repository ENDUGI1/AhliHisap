<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AhliHisap">
  <defs>
    <clipPath id="tile">
      <rect x="56" y="56" width="400" height="400" rx="104" />
    </clipPath>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4FD6C1" />
      <stop offset="1" stop-color="#2FA894" />
    </linearGradient>
  </defs>
  <rect x="56" y="56" width="400" height="400" rx="104" fill="#0C1718" />
  <g clip-path="url(#tile)">
    <!-- liquid level filling lower portion -->
    <path d="M56 320 C 150 290, 220 350, 300 318 C 370 290, 420 332, 456 320 L 456 456 L 56 456 Z" fill="url(#liquid)" />
    <path d="M56 320 C 150 290, 220 350, 300 318 C 370 290, 420 332, 456 320" fill="none" stroke="#7BE6D5" stroke-width="6" opacity="0.6" />
  </g>
  <!-- amber coin = money returning -->
  <circle cx="332" cy="184" r="40" fill="#F2A93C" />
  <rect x="56" y="56" width="400" height="400" rx="104" fill="none" stroke="#234245" stroke-width="6" />
</svg>
